<!DOCTYPE html>
<html lang='en'>
  <head>
    <title>Portfolio « Mitchel Kelonye</title>
    <meta charset='UTF-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge,chrome=1'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta name='description' content='Portfolio'>
    <meta name='keywords' content='mitchel, kelonye, github, portfolio'>
    <link rel='shortcut icon' href='images/favicon.ico'>
    <style>
      @-webkit-keyframes pop-in {
        0% { opacity: 0; -webkit-transform: scale(0.5); }
        100% { opacity: 1; -webkit-transform: scale(1); }
      }
      @-moz-keyframes pop-in {
        0% { opacity: 0; -moz-transform: scale(0.5); }
        100% { opacity: 1; -moz-transform: scale(1); }
      }
      @keyframes pop-in {
        0% { opacity: 0; transform: scale(0.5); }
        100% { opacity: 1; transform: scale(1); }
      }
      *{
        margin: 0;
        padding: 0;
      }
      body{
        font-family: "URW Gothic L", "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 15px;
        color: #adafb3;
      }
      main{
        margin: 20px 0;
      }
      main span,
      main a,
      main a:visited{
        color: #777;
        text-decoration: none;
      }
      main h1{
        font-size: 30px;
        font-weight: normal;
        line-height: 1.3;
        margin: 50px 0;
      }
      main img{
        border-radius: 2px;
        box-shadow: 0 0 10px rgba(0,0,0,.5), 0 10px 10px rgba(0,0,0,.1)
      }
      main ol li{
        list-style: none;
        display: inline-block;
        margin-right: 10px;
        cursor: pointer;
      }
      main ol li img{
        width: 10pc;
        list-style: none;
        opacity: .8;
        border-radius: 2px;
      }
      main #fore{
        margin-bottom: 20px;
      }
      main #fore img{
        max-width: 100%;
        max-height: 100%;
        -webkit-animation: pop-in 0.4s;
        -moz-animation: pop-in 0.4s;
        -ms-animation: pop-in 0.4s;
      }
      footer{
        margin: 20px 0;
      }
      @media screen and (min-width: 960px){
        body{
          padding: 20px 200px;
        }
      }
      @media screen and (max-width: 960px){
        body{
          padding: 20px 100px;
        }
      }
      @media screen and (max-width: 768px){
        body{
          padding: 20px 50px;
        }
      }
      @media screen and (max-width: 524px){
        body{
          padding: 20px;
        }
        #fore{
          display: none;
        }
      }
    </style>
  </head>
  <body>
      <header role='header'>
        <img src='images/logo.png' />
      </header>
      <main role='main'>
        <div>
          <h1>Hi, am <span>Mitchel Kelonye</span>, a web developer from Nairobi, and I write code for <a href='http://wezatele.com' target='external'>Wezatele</a> ... and yes, I <a href='http://twitter.com/kelonye' target='external'>tweet</a> and <a href='http://github.com/kelonye' target='external'>contribute</a> to open source.</h1>
        </div>
        <div>
          <h1>{{portfolio}}</h1>
        </div>
        <div id='fore'>
          <a href='http://pitchas-kelonye.rhcloud.com' target='external'>
          <img src='images/pitchas-app.png' />
          </a>
        </div>
        <div>
          <ol>
            <li><img data-href='http://pitchas-kelonye.rhcloud.com' src='images/pitchas-app.png' /></li>
            <li><img data-href='http://component-kelonye.rhcloud.com/' src='images/component-app.png' /></li>
            <li><img data-href='http://www.vutiz.com' src='images/vutiz-app.png' /></li>
            <li><img data-href='http://wimi-kelonye.appspot.com/' src='images/wimi-app.png' /></li>
          </ol>
        </div>
    </main>
    <footer>
      <h1>&copy; <i id='year'></i> kelonye</h1>
    </footer>
    <script>
      var fore = document.getElementById('fore');
      var imgs = document.querySelectorAll('ol img');
      var n = imgs.length;
      var img;
      var onclick = function(e){
        var href = e.target.dataset.href;
        var src = e.target.src;
        var html = '';
        html += '<a href="'+href+'" target="external">';
        html += '<img src="'+src+'" />';
        html += '</a>';
        fore.innerHTML = html;
      }
      while (n--){
        img = imgs[n];
        img.onclick = onclick;
      }
      var now = new Date;
      var year = now.getUTCFullYear();
      var yearEl = document.getElementById('year');
      yearEl.innerHTML = year;
    </script>
  </body>
</html>
